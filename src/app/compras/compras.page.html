<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Compras</ion-title>
  </ion-toolbar>
</ion-header>


<ion-tabs>
  <ion-tab-bar slot="bottom">

    <ion-tab-button tab="inicio" routerLink="/menu">
      <ion-icon name="home"></ion-icon>
      <ion-label>Inicio</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="perfil" routerLink="/perfil">
      <ion-icon name="person"></ion-icon>
      <ion-label>Perfil</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="ventas" routerLink="/ventas">
      <ion-icon name="cash"></ion-icon>
      <ion-label>Ventas</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="compras" routerLink="/compras">
      <ion-icon name="cart"></ion-icon>
      <ion-label>Compras</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="cartera" routerLink="/cartera">
      <ion-icon name="wallet"></ion-icon>
      <ion-label>Cartera</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="log-out" routerLink="/login">
      <ion-icon name="settings"></ion-icon>
      <ion-label>Cerrar Seción</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
