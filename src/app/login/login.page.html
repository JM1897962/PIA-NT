<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Iniciar Sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-grid>
    <ion-row class="ion-justify-content-center">
      <ion-col size-md="6" size-sm="12">
        <div class="login-container">
          <h2 class="ion-text-center">Bienvenido de nuevo</h2>
          <ion-item>
            <ion-label position="floating">Correo electrónico o número de teléfono</ion-label>
            <ion-input type="text" [(ngModel)]="email" required></ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="floating">Contraseña</ion-label>
            <ion-input type="password" [(ngModel)]="password" required></ion-input>
          </ion-item>

          <ion-button expand="block" color="primary" (click)="login()">Iniciar sesión</ion-button>

          <div class="ion-text-center">
            <ion-button expand="block" color="secondary" (click)="goToRegister()">Crear cuenta nueva</ion-button>
          </div>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
